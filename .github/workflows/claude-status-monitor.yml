# .github/workflows/claude-status-monitor.yml
#
# Alerts Slack only for MAJOR or CRITICAL Claude incidents.
# Uses Anthropic's real timestamps. Won't re-alert on the same update.
#
# Setup:
#   1. Add SLACK_WEBHOOK_URL to repo Secrets (Settings → Secrets → Actions)
#   2. Commit this file to .github/workflows/
#   3. Done.

name: Claude Status Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  check-claude-status:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      # We use the GitHub Actions cache to remember which incidents
      # we've already alerted on — so you don't get repeat messages.
      - name: Restore alert history cache
        uses: actions/cache@v4
        with:
          path: alerted_ids.txt
          key: claude-alerted-ids-${{ github.run_id }}
          restore-keys: |
            claude-alerted-ids-

      - name: Check Claude Status & Alert Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 - <<'EOF'
          import requests, os, sys
          from datetime import datetime, timezone

          WEBHOOK     = os.environ["SLACK_WEBHOOK_URL"]
          STATUS_URL  = "https://status.claude.com/api/v2/summary.json"
          CACHE_FILE  = "alerted_ids.txt"

          # ── Only alert on these levels ────────────────────────────────────
          ALERT_ON_IMPACT = {"major", "critical"}

          IMPACT_COLOR = {
              "minor":    "#f0c418",
              "major":    "#e07b39",
              "critical": "#cc0000",
          }
          IMPACT_EMOJI = {
              "minor":    "⚠️",
              "major":    "🔶",
              "critical": "🔴",
          }

          # ── Load already-alerted update IDs from cache ───────────────────
          alerted = set()
          if os.path.exists(CACHE_FILE):
              with open(CACHE_FILE) as f:
                  alerted = set(line.strip() for line in f if line.strip())

          new_alerts = []

          # ── Fetch status summary ──────────────────────────────────────────
          try:
              r = requests.get(STATUS_URL, timeout=15)
              r.raise_for_status()
              data = r.json()
          except Exception as e:
              print(f"ERROR fetching status: {e}")
              sys.exit(0)  # Don't fail the action on network errors

          indicator   = data["status"]["indicator"]   # none/minor/major/critical
          description = data["status"]["description"]
          incidents   = data.get("incidents", [])

          if indicator == "none" or indicator not in ALERT_ON_IMPACT:
              print(f"✅ Status: {description} (indicator={indicator}) — no alert needed.")
              sys.exit(0)

          # ── Process each incident ─────────────────────────────────────────
          for inc in incidents:
              impact  = inc.get("impact", "none")
              if impact not in ALERT_ON_IMPACT:
                  continue

              inc_id  = inc.get("id", "")
              name    = inc.get("name", "Unknown incident")
              link    = inc.get("shortlink", "https://status.claude.com")
              updates = inc.get("incident_updates", [])

              if not updates:
                  continue

              # Get the latest update
              latest_update = updates[0]
              update_id     = latest_update.get("id", inc_id)
              update_body   = latest_update.get("body", "No details available.")
              update_status = latest_update.get("status", "").title()

              # Use Anthropic's real timestamp, not our detection time
              raw_ts = latest_update.get("updated_at", "")
              try:
                  dt = datetime.fromisoformat(raw_ts.replace("Z", "+00:00"))
                  timestamp = dt.strftime("%b %d, %Y at %H:%M UTC")
              except Exception:
                  timestamp = raw_ts or "Unknown"

              # Skip if we've already alerted on this exact update
              if update_id in alerted:
                  print(f"Skipping already-alerted update: {update_id} ({name})")
                  continue

              # Queue this alert
              new_alerts.append({
                  "update_id": update_id,
                  "impact":    impact,
                  "name":      name,
                  "status":    update_status,
                  "body":      update_body,
                  "timestamp": timestamp,
                  "link":      link,
              })

          # ── Send Slack alerts ─────────────────────────────────────────────
          for alert in new_alerts:
              emoji = IMPACT_EMOJI.get(alert["impact"], "⚠️")
              color = IMPACT_COLOR.get(alert["impact"], "#f0c418")

              payload = {
                  "text": f"{emoji} *Claude Incident [{alert['impact'].upper()}]: {alert['name']}*",
                  "username": "Claude Status Monitor",
                  "icon_url": "https://www.anthropic.com/images/icons/apple-touch-icon.png",
                  "attachments": [{
                      "color": color,
                      "fields": [
                          {"title": "Status",     "value": alert["status"],           "short": True},
                          {"title": "Impact",     "value": alert["impact"].upper(),   "short": True},
                          {"title": "Update",     "value": alert["body"],             "short": False},
                          {"title": "Timestamp",  "value": alert["timestamp"],        "short": True},
                          {"title": "Status Page","value": f"<{alert['link']}|View Incident>", "short": True},
                      ]
                  }]
              }

              try:
                  r = requests.post(WEBHOOK, json=payload, timeout=10)
                  r.raise_for_status()
                  print(f"Alert sent: [{alert['impact'].upper()}] {alert['name']}")
                  alerted.add(alert["update_id"])
              except Exception as e:
                  print(f"ERROR sending Slack alert: {e}")

          # ── Save updated alert history to cache ───────────────────────────
          with open(CACHE_FILE, "w") as f:
              f.write("\n".join(alerted))

          if not new_alerts:
              print("No new alerts to send.")

          EOF

      - name: Save alert history cache
        if: always()
        uses: actions/cache@v4
        with:
          path: alerted_ids.txt
          key: claude-alerted-ids-${{ github.run_id }}
